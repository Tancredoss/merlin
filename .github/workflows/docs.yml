name: Docs Validation

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      PIP_NO_CACHE_DIR: "1"
      PIP_NO_COMPILE: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install documentation dependencies
        run: |
          df -h
          python -m pip install --upgrade pip
          df -h
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0.0,<=2.10.0"
          df -h
          pip install -e ".[docs]"
          df -h

      - name: Build documentation
        working-directory: docs
        run: SPHINXOPTS="-W --keep-going -n -D nbsphinx_execute=never" make clean html

      - name: Clean generated documentation
        if: always()
        working-directory: docs
        run: make clean
